{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2 class="text-center mb-4">
            👤 My Profile
        </h2>

        <table class="table">

            <tr>
                <th>Username</th>
                <td>{{ request.user.username }}</td>
            </tr>

            <tr>
                <th>Email</th>
                <td>{{ request.user.email }}</td>
            </tr>

            <tr>
                <th>Date Joined</th>
                <td>{{ request.user.date_joined }}</td>
            </tr>

        </table>

        <div class="text-center mt-4">
            <a href="{% url 'edit_profile' %}" class="btn btn-primary">
                Edit Profile
            </a>
        </div>

    </div>

</div>

{% endblock %}
