{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h3>Login</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success w-100">
                        Login
                    </button>
                    <p class="mt-3">
    <a href="{% url 'password_reset' %}">
        Forgot Password?
    </a>
</p>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
